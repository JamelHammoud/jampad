name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, alpha, next)"
        required: true
        default: "latest"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify, build, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "tag and package.json version both report $PKG"

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build client bundle
        run: bun run build

      - name: Pick npm dist-tag
        id: dist-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            case "$VERSION" in
              *-alpha*|*-beta*|*-rc*|*-next*)
                # Pre-release: derive tag from suffix
                SUFFIX="${VERSION#*-}"
                TAG="${SUFFIX%%.*}"
                echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "tag=latest" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
