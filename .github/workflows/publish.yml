name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish if package.json version is new
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --quiet --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$VERSION already exists. Skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish v$VERSION"
          fi

      - name: Set up Bun
        if: steps.version.outputs.skip == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (for npm publish)
        if: steps.version.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.version.outputs.skip == 'false'
        run: bun install --frozen-lockfile

      - name: Typecheck
        if: steps.version.outputs.skip == 'false'
        run: bun run typecheck

      - name: Lint
        if: steps.version.outputs.skip == 'false'
        run: bun run lint

      - name: Test
        if: steps.version.outputs.skip == 'false'
        run: bun run test

      - name: Build client bundle
        if: steps.version.outputs.skip == 'false'
        run: bun run build

      - name: Publish to npm
        if: steps.version.outputs.skip == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag + GitHub Release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-next') }}
