name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck / format / lint / test / build / integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build (client SPA + bundled server)
        run: bun run build

      # Pack the tarball, install with --omit=dev in a fresh dir, spawn the
      # CLI, drive real disk I/O through the API. Catches devDependency leaks
      # and distribution drift that unit tests can't see.
      - name: Consumer-install integration test
        run: bun run test:integration
